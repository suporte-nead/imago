<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Galeria Regenerada — Imago</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e53935; /* Vermelho principal */
            --red-light: #ff6d6a; /* Vermelho mais claro para hover/detalhe */
            --bg: #0c0c0f; /* Fundo escuro */
            --card: #14161d; /* Fundo dos cartões (ligeiramente mais claro) */
            --stroke: #2e313e; /* Borda/separador mais visível e elegante */
            --text: #e7e7ea; /* Texto principal claro */
            --muted: #a0a4b0; /* Texto secundário */
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
            --radius-xl: 20px;
            --radius-lg: 14px;
            --radius-md: 10px;
        }

        /* RESET e Base */
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
        }
        .container {
            max-width: 960px; 
            margin: 0 auto;
            padding: 24px 18px; 
        }
        h1, h2 { 
            font-weight: 700; 
            margin: 0; 
            letter-spacing: -0.02em; 
            color: var(--text);
        }
        h1 { font-size: 1.8em; }

        /* HEADER */
        .vheader { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 16px; 
            margin: 10px auto 28px;
        }
        .vheader img {
            display: block;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,.2));
        }
        .seal { max-width: 70px; width: 40%; }
        .app { max-width: 180px; width: 70%; }
        .nead { max-width: 75px; width: 60%; }
        @media (min-width: 820px) {
            .vheader { flex-direction: row; justify-content: space-between; gap: 24px; }
            .vheader img { width: auto; max-height: 84px; }
            .app { max-height: 96px; }
        }

        /* UTILITÁRIOS */
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .btn {
            background: var(--red);
            border: none;
            border-radius: var(--radius-md);
            color: #fff;
            font-weight: 700;
            padding: 10px 20px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            text-decoration: none;
            box-shadow: 0 4px 8px rgba(229, 57, 53, 0.3);
        }
        .btn:hover { background: var(--red-light); box-shadow: 0 6px 12px rgba(229, 57, 53, 0.4); }
        .btn:active { transform: scale(0.98); }
        .btn-home {
            background: #2b313c; 
            margin-right: 10px; 
            color: #e7e7ea; 
            border: 1px solid #3c4452; 
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-decoration: none; /* Garante que 'a' se pareça com 'button' */
        }
        .btn-home:hover { background: #454c59; border-color: #454c59; box-shadow: 0 6px 10px rgba(0, 0, 0, 0.4); }
        
        /* CARD e Grid */
        .card {
            background: linear-gradient(145deg, var(--card), #0e1015);
            border: 1px solid var(--stroke);
            border-radius: var(--radius-xl);
            padding: 20px 24px;
            margin: 0 0 20px;
            box-shadow: var(--shadow);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .image-item {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--stroke);
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        
        .thumb {
            width: 100%;
            border-radius: 8px;
            border: 1px solid #222;
            display: block;
            aspect-ratio: 16/9;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .thumb:hover {
            transform: scale(1.02);
        }

        .cap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px; 
            color: var(--muted);
            font-size: 0.9em;
            padding-top: 4px;
        }
        .cap span {
            font-size: 0.8em;
            color: var(--muted);
            font-weight: 500;
        }

        .dl {
            background: #2b313c;
            border-color: #454c59;
            color: #e7e7ea;
            border: 1px solid;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: background 0.2s;
        }
        .dl:hover { background: #3c4452; }
        
        /* Para o fundo gradiente */
        .bg-gradient-modern {
          background-color: #0c0c0f;
          background-image: radial-gradient(circle at 50% 10%, rgba(229, 57, 53, 0.1), transparent 50%),
            radial-gradient(1200px 600px at 50% -10%, #17171c, transparent);
        }
    </style>
</head>
<body class="bg-gradient-modern">
    <main class="container">
        <div class="vheader">
            <img class="seal max-h-12" src="/static/UNL.png" alt="Universidade Nilton Lins">
            <img class="app max-h-14" src="/static/IMAGONEW.png" alt="IMAGO — Ilustração Mágica de Textos">
            <img class="nead max-h-12" src="/static/NEAD.png" alt="NEAD Premium">
        </div>

        <div class="row" id="header-actions">
            <a id="btnBack" href="/" class="btn btn-home">↩ Voltar para o Progresso</a>
        </div>

        <section class="card">
            <h1>Galeria de Imagens Regeneradas</h1>
            <p style="color:var(--muted); margin: 8px 0 20px;">Todas as imagens geradas como variações a partir de um parágrafo original do job: <strong id="jobIdDisplay">N/A</strong></p>
            <div id="imageGallery" class="grid">
                </div>
            <div id="loading" style="text-align:center; padding: 20px; display:none;">
                <p style="color:var(--muted)">Carregando galeria...</p>
            </div>
            <div id="noResults" style="text-align:center; padding: 20px; display:none;">
                <p style="color:var(--muted)">Nenhuma imagem regenerada encontrada para este job.</p>
            </div>
        </section>
    </main>

    <script>
        function inferJobId(){
            const q = new URLSearchParams(location.search).get('job_id'); 
            return q;
        }
        
        // Função para formatar o nome do arquivo, ex.: img_01_v1.png
        function getDownloadName(src, idx) {
            const filename = src.split('/').pop().split('?')[0]; // Pega o nome do arquivo
            // Tenta adivinhar um nome mais amigável
            const parts = filename.split('_');
            if (parts.length >= 3 && parts[1] === 'paragraph' && parts[2] === 'regen' && parts[3]) {
                return `img_p${parts[3]}_v${idx+1}.png`;
            }
            return `regenerada_${idx+1}.png`;
        }

        async function loadGallery(){
            const jid = inferJobId();
            const galleryEl = document.getElementById('imageGallery');
            const loadingEl = document.getElementById('loading');
            const noResultsEl = document.getElementById('noResults');
            const jobIdDisplay = document.getElementById('jobIdDisplay');
            const btnBack = document.getElementById('btnBack');

            galleryEl.innerHTML = '';
            loadingEl.style.display = 'block';
            noResultsEl.style.display = 'none';
            jobIdDisplay.textContent = jid || 'N/A';
            
            if (jid) {
                btnBack.href = '/progress/' + encodeURIComponent(jid);
            } else {
                 btnBack.href = '/';
                 btnBack.textContent = '↩ Voltar para o Início';
            }


            if (!jid) {
                loadingEl.style.display = 'none';
                noResultsEl.querySelector('p').textContent = 'job_id não especificado na URL.';
                noResultsEl.style.display = 'block';
                return;
            }

            try{
                // A rota /regenerated_json será implementada no app.py
                const r = await fetch('/regenerated_json?job_id='+encodeURIComponent(jid), {cache:'no-store'});
                const data = await r.json();
                const list = data.items || [];
                
                loadingEl.style.display = 'none';

                if (!list.length){
                    noResultsEl.style.display = 'block';
                    return;
                }
                
                list.forEach((it, idx)=>{
                    const card = document.createElement('div'); card.className='image-item';
                    
                    const imgLink = document.createElement('a');
                    imgLink.href = it.src; imgLink.target = '_blank';
                    
                    const img = document.createElement('img');
                    img.className = 'thumb'; img.src = it.src; img.alt = 'Imagem Regenerada';
                    
                    imgLink.appendChild(img);
                    
                    const cap = document.createElement('div'); cap.className='cap';
                    
                    const metaSpan = document.createElement('span');
                    // Tenta exibir a dimensão se disponível
                    metaSpan.textContent = it.w && it.h ? `${it.w} × ${it.h} px` : `Versão ${idx + 1}`;
                    
                    const dlBtn = document.createElement('button'); dlBtn.className='dl'; dlBtn.textContent='Baixar';
                    dlBtn.onclick = async ()=>{
                        const suggestName = getDownloadName(it.src, idx);
                        const name = prompt('Nome do arquivo (com .png):', suggestName) || suggestName;
                        if (!name || name.trim() === '') return;
                        try{
                            const r = await fetch(it.src);
                            const blob = await r.blob();
                            const a = document.createElement('a');
                            a.href = URL.createObjectURL(blob);
                            a.download = name;
                            document.body.appendChild(a);
                            a.click();
                            a.remove();
                            setTimeout(()=>URL.revokeObjectURL(a.href), 1200);
                        }catch(e){
                            alert('Erro ao tentar baixar o arquivo.');
                        }
                    };

                    cap.appendChild(metaSpan);
                    cap.appendChild(dlBtn);
                    card.appendChild(imgLink);
                    card.appendChild(cap);
                    galleryEl.appendChild(card);
                });

            }catch(e){
                loadingEl.style.display = 'none';
                noResultsEl.querySelector('p').textContent = 'Falha ao carregar a lista de imagens.';
                noResultsEl.style.display = 'block';
                console.error(e);
            }
        }
        
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', loadGallery);
        else loadGallery();
    </script>
</body>
</html>
